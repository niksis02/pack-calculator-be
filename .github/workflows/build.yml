name: Build & Test

on:
  pull_request:

env:
  GO_VERSION: "1.26"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: make tidy

      - name: Build
        run: make build

      - name: Test
        run: make test-cover

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
